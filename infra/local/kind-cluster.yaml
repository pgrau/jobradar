# ==============================================================================
# JobRadar — kind cluster configuration
# 1 control-plane + 2 workers
# ==============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: jobradar

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
    labels:
      workload: services

  - role: worker
    labels:
      workload: services
