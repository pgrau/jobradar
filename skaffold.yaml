apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: jobradar

build:
  local:
    push: false
    useBuildkit: true
  tagPolicy:
    sha256: {}
  artifacts:
    - image: ghcr.io/pgrau/jobradar/embedder
      context: .
      docker:
        dockerfile: services/embedder/Dockerfile

manifests:
  rawYaml:
    - k8s/manifests/embedder/*.yaml

deploy:
  kubectl:
    defaultNamespace: jobradar

profiles:
  - name: local
    activation:
      - env: ENV=local
    build:
      local:
        push: false

  - name: hetzner
    activation:
      - env: ENV=hetzner
    build:
      local:
        push: true

portForward:
  - resourceType: service
    resourceName: grafana
    namespace: jobradar
    port: 3000
    localPort: 3100

  - resourceType: service
    resourceName: langfuse-web
    namespace: jobradar
    port: 3000
    localPort: 3101