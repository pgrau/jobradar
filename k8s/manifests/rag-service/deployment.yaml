apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: jobradar
  labels:
    app: rag-service
    app.kubernetes.io/name: rag-service
    app.kubernetes.io/part-of: jobradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
        app.kubernetes.io/name: rag-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: jobradar
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # distroless nonroot uid
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rag-service
          image: ghcr.io/pgrau/jobradar/rag-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50052
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rag-service-config
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: rag-service-secret
                  key: postgres-dsn
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
