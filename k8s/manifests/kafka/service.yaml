apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: jobradar
  labels:
    app: kafka
    app.kubernetes.io/part-of: jobradar
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: jobradar
  labels:
    app: kafka
    app.kubernetes.io/part-of: jobradar
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: client
    - name: controller
      port: 9093
      targetPort: controller