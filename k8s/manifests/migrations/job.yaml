apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: jobradar
  labels:
    app.kubernetes.io/part-of: jobradar
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/pgrau/jobradar/migrate:latest
          imagePullPolicy: IfNotPresent
          args: ["up"]
          env:
            - name: POSTGRES_HOST
              value: postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: jobradar
            - name: POSTGRES_USER
              value: jobradar
            - name: POSTGRES_SSL_MODE
              value: disable
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi